<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>个非车业务经营指引（加密版）</title><style>body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;background:linear-gradient(135deg,#f7f8fb,#fff 48%,#fff4f4);color:#172033;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}.box{width:min(680px,100%);background:rgba(255,255,255,.94);border:1px solid #e5e7eb;border-radius:22px;box-shadow:0 24px 70px rgba(16,24,40,.12);padding:34px}.brand{display:flex;gap:12px;align-items:center;margin-bottom:22px}.logo{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,#c5161d,#ef4444);display:grid;place-items:center;color:#fff;font-weight:800}h1{font-size:24px;margin:0 0 6px}.sub,.hint,.foot{color:#667085;line-height:1.7}.sub{margin:0;font-size:14px}.notice{margin:24px 0;padding:16px 18px;border-radius:14px;background:#fff7ed;border:1px solid #fed7aa;color:#7c2d12;font-size:14px;line-height:1.7}label{display:block;font-weight:650;margin-bottom:9px}.row{display:flex;gap:10px}input{flex:1;border:1px solid #d0d5dd;border-radius:12px;padding:14px;font-size:16px;outline:none}input:focus{border-color:#c5161d;box-shadow:0 0 0 4px rgba(197,22,29,.10)}button{border:0;border-radius:12px;background:#c5161d;color:#fff;padding:0 20px;font-weight:700;font-size:15px;cursor:pointer;white-space:nowrap}button:disabled{opacity:.65;cursor:not-allowed}.err{margin-top:14px;color:#b42318;font-size:14px;display:none}.hint{margin-top:14px;font-size:13px}.foot{margin-top:24px;padding-top:18px;border-top:1px solid #e5e7eb;color:#98a2b3;font-size:12px}@media(max-width:560px){.box{padding:24px}.row{flex-direction:column}button{height:48px}}</style></head><body><main class="box"><div class="brand"><div class="logo">险</div><div><h1>个非车业务经营指引</h1><p class="sub">加密版在线页面 · 输入授权口令后查看正文</p></div></div><div class="notice">本文件含业务渠道、产品经营和风控提示等内部材料，请仅在授权范围内传阅。页面正文已加密，口令不会上传至服务器。</div><label for="pwd">请输入查看口令</label><div class="row"><input id="pwd" type="password" autocomplete="current-password" placeholder="输入口令"><button id="btn" onclick="decryptAndOpen()">解密查看</button></div><div id="err" class="err">口令不正确，或浏览器不支持本地解密。请核对后重试。</div><p class="hint">建议使用 Chrome、Edge、Safari 等现代浏览器打开。手机端也可直接查看。</p><div class="foot">加密方式：PBKDF2-SHA256 + AES-GCM，正文经 GZIP 压缩后加密。本页面为本地解密。</div></main><script>const payload={salt:"kOhtvjGU7RTsoDauRouUKA==",iv:"Zq+9TQLLtlsppfsk",iterations:250000,chunks:6};function b64ToBytes(b64){const bin=atob(b64),bytes=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);return bytes}async function deriveKey(p,s,i){const enc=new TextEncoder();const base=await crypto.subtle.importKey('raw',enc.encode(p),'PBKDF2',false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt:s,iterations:i,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['decrypt'])}async function gunzip(bytes){if(!('DecompressionStream' in window))throw new Error('unsupported');const ds=new DecompressionStream('gzip');const w=ds.writable.getWriter();w.write(bytes);w.close();const ab=await new Response(ds.readable).arrayBuffer();return new Uint8Array(ab)}async function loadCiphertext(){let parts=[];for(let i=0;i<payload.chunks;i++){const r=await fetch(`payload${i}.txt`,{cache:'no-store'});if(!r.ok)throw new Error('load failed');parts.push((await r.text()).trim())}return parts.join('')}async function decryptAndOpen(){const btn=document.getElementById('btn'),err=document.getElementById('err');err.style.display='none';btn.disabled=true;btn.textContent='解密中...';try{const pwd=document.getElementById('pwd').value;const key=await deriveKey(pwd,b64ToBytes(payload.salt),payload.iterations);const ciphertext=await loadCiphertext();const comp=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64ToBytes(payload.iv)},key,b64ToBytes(ciphertext));const html=new TextDecoder().decode(await gunzip(new Uint8Array(comp)));document.open();document.write(html);document.close()}catch(e){err.style.display='block';btn.disabled=false;btn.textContent='解密查看'}}document.getElementById('pwd').addEventListener('keydown',e=>{if(e.key==='Enter')decryptAndOpen()});</script></body></html>
